<!doctype html>
<!-- ===================================================================
     BlockFrame cover · HORIZONTAL template (hero left, motif right)
     Use for:  cover-16x9.html  (1920×1080, generic thumbnail / long main)
               cover-16x10.html (1920×1200, Bilibili landscape)
               cover-4x3.html   (1440×1080)
     Fill the «PLACEHOLDERS», then render with render-all-covers.sh.
     Retarget ratio: change .cover{width/height} only; the side-by-side
     layout reflows. Fonts: local ./fonts/*.woff2 next to this file.
     ==================================================================== -->
<html lang="zh-CN"><head><meta charset="utf-8" /><meta name="color-scheme" content="light">
<style>
@font-face{font-family:"Space Grotesk";src:url("fonts/space-grotesk-700.woff2") format("woff2");font-weight:700;font-display:block;}
@font-face{font-family:"Noto Sans SC";src:url("fonts/noto-sans-sc-900.woff2") format("woff2");font-weight:900;font-display:block;}
@font-face{font-family:"Noto Sans SC";src:url("fonts/noto-sans-sc-700.woff2") format("woff2");font-weight:700;font-display:block;}
@font-face{font-family:"Noto Sans SC";src:url("fonts/noto-sans-sc-500.woff2") format("woff2");font-weight:500;font-display:block;}
@font-face{font-family:"JetBrains Mono";src:url("fonts/jetbrains-mono-600.woff2") format("woff2");font-weight:600;font-display:block;}
:root{--cream:#FFFDF5;--ink:#000;--ink2:#2A2A24;--pink:#FE90E8;--blue:#C0F7FE;--green:#99E885;--yellow:#F7CB46;--gold:#FFDC8B;
--disp:"Space Grotesk","Noto Sans SC",sans-serif;--zh:"Noto Sans SC",sans-serif;--mono:"JetBrains Mono",monospace;}
*{margin:0;padding:0;box-sizing:border-box;}html,body{background:#000;}
/* ← 16:9 = 1920×1080 · 16:10 = 1920×1200 · 4:3 = 1440×1080 */
.cover{position:relative;width:1920px;height:1080px;background:var(--cream);color:var(--ink);overflow:hidden;font-family:var(--zh);}
.cover::before{content:"";position:absolute;inset:0;background-image:radial-gradient(var(--ink) 1.6px,transparent 1.6px);background-size:46px 46px;opacity:.05;}
.frame{position:absolute;inset:30px;border:6px solid var(--ink);}
.top{position:absolute;left:80px;right:80px;top:64px;display:flex;justify-content:space-between;align-items:center;font-family:var(--mono);font-weight:600;font-size:25px;letter-spacing:.10em;text-transform:uppercase;}
.top .pill{border:3px solid var(--ink);border-radius:999px;padding:8px 20px;}
.left{position:absolute;left:84px;top:50%;transform:translateY(-50%);width:980px;}
.kick{display:inline-block;background:var(--ink);color:var(--cream);font-weight:700;font-size:30px;letter-spacing:.05em;padding:10px 22px;margin-bottom:34px;}
.t1{font-family:var(--disp);font-weight:700;font-size:196px;line-height:.88;letter-spacing:-.02em;}
.t2{margin-top:24px;}
.hl{display:inline-block;font-family:var(--zh);font-weight:900;font-size:132px;line-height:1.0;background:var(--green);border:7px solid var(--ink);box-shadow:16px 16px 0 var(--ink);padding:.06em .16em .14em;}
.sub{margin-top:46px;font-weight:500;font-size:42px;line-height:1.32;color:var(--ink2);}
.sub b{font-weight:700;color:var(--ink);}
.motif{position:absolute;right:90px;top:50%;transform:translateY(-50%);width:700px;}
.mbox{border:6px solid var(--ink);background:#FBF7EA;box-shadow:18px 18px 0 var(--ink);padding:30px;position:relative;}
.mbox .lab{position:absolute;left:-6px;top:-46px;background:var(--ink);color:var(--cream);font-family:var(--mono);font-weight:600;font-size:25px;letter-spacing:.10em;padding:8px 16px;}
.row{display:flex;align-items:baseline;gap:16px;border:5px solid var(--ink);background:#FFFEF8;padding:16px 22px;box-shadow:7px 7px 0 var(--ink);}
.row + .row{margin-top:16px;}
.row .n{font-family:var(--mono);font-weight:600;font-size:33px;min-width:165px;}
.row .d{font-family:var(--zh);font-weight:500;font-size:30px;color:#4a473d;}
.row.on{background:var(--yellow);}
.tags{margin-top:22px;display:flex;gap:14px;}
.tags span{font-family:var(--mono);font-weight:600;font-size:25px;border:4px solid var(--ink);box-shadow:5px 5px 0 var(--ink);padding:8px 16px;}
.tags .a{background:var(--pink);}.tags .b{background:var(--blue);}.tags .c{background:var(--green);}
.foot{position:absolute;left:80px;right:80px;bottom:60px;display:flex;justify-content:space-between;align-items:center;font-family:var(--mono);font-weight:600;font-size:24px;letter-spacing:.08em;text-transform:uppercase;}
.foot .dot{display:inline-block;width:10px;height:10px;background:var(--ink);border-radius:50%;margin:0 12px;transform:translateY(-3px);}
</style></head>
<body>
<div class="cover">
  <div class="frame"></div>
  <div class="top"><span class="pill">«BRAND»</span><span>«KICKER»</span></div>
  <div class="left">
    <span class="kick">«KICKER · 副标题»</span>
    <div class="t1">«BigWord»</div>
    <div class="t2"><span class="hl">«高亮词»</span></div>
    <div class="sub">«一句副文案» - <b>«强调的半句»</b></div>
  </div>
  <div class="motif">
    <div class="mbox">
      <span class="lab">«标签»</span>
      <div class="row on"><span class="n">«要点 A»</span><span class="d">«说明»</span></div>
      <div class="row"><span class="n">«要点 B»</span><span class="d">«说明»</span></div>
    </div>
    <div class="tags"><span class="a">«标签 1»</span><span class="b">«标签 2»</span><span class="c">«标签 3»</span></div>
  </div>
  <div class="foot"><span>«左角标»<span class="dot"></span>«右半»</span><span>横版 · 16:9</span></div>
</div>
</body></html>
